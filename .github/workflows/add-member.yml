name: Add member

on:
  repository_dispatch:
    types: [add-member]

permissions:
  contents: write

jobs:
  add:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Append member to data/members.json
        env:
          ID:     ${{ github.event.client_payload.id }}
          NAME:   ${{ github.event.client_payload.name }}
          JOINED: ${{ github.event.client_payload.joined }}
        run: |
          python3 - <<'PY'
          import json, os, datetime, pathlib

          id_ = os.environ['ID']
          if not id_:
              raise SystemExit('client_payload.id is required')

          path = pathlib.Path('data/members.json')
          members = json.loads(path.read_text())

          if any(m.get('id') == id_ for m in members):
              print(f'{id_} already exists; skipping')
          else:
              members.append({
                  'id': id_,
                  'name': os.environ['NAME'],
                  'joined': os.environ.get('JOINED') or datetime.date.today().isoformat(),
                  'pronouns': '',
              })
              path.write_text(json.dumps(members, indent=2) + '\n')
              print(f'Added {id_}')
          PY

      - name: Commit
        run: |
          git config user.name  "jxnfilmclub-bot"
          git config user.email "bot@jxnfilm.club"
          if git diff --quiet; then
            echo "No changes"
          else
            git add data/members.json
            git commit -m "Add member: ${{ github.event.client_payload.id }}"
            git push
          fi
