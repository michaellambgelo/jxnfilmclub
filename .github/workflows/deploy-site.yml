name: Deploy site

on:
  push:
    branches: [main]
  workflow_run:
    # Rebuild when bot workflows commit to main (GH's default token doesn't
    # fire push events, so chain via workflow_run instead).
    workflows: [Add member, Update member, Refresh Letterboxd data]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - run: npm ci

      - name: Build site
        run: npm run build

      # SPA fallback: GitHub Pages serves 404.html for unknown paths, which
      # lets the client-side router handle deep links like /events.
      - name: Copy index.html to 404.html for SPA routing
        run: cp .dist/index.html .dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
