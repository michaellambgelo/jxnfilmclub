name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Nue
        run: bun add -g nuekit@0.5.3

      - name: Build site
        run: nue build -p

      # SPA fallback: GitHub Pages serves 404.html for unknown paths, which
      # lets the client-side router handle deep links like /events.
      - name: Copy index.html to 404.html for SPA routing
        run: cp .dist/prod/index.html .dist/prod/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .dist/prod

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
