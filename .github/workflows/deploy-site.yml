name: Deploy site

on:
  push:
    branches: [main]
  workflow_run:
    # Rebuild when bot workflows commit to main (GH's default token doesn't
    # fire push events, so chain via workflow_run instead).
    workflows: [Add member, Update member, Refresh Letterboxd data, Refresh Spotify episodes]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    # Only gate on tests for direct pushes/manual. Bot-driven workflow_run
    # re-deploys don't change code and shouldn't re-run the full test suite.
    if: github.event_name != 'workflow_run'
    uses: ./.github/workflows/test.yml

  build:
    needs: [test]
    # `needs` + `if: always()` pattern: run build if test passed, OR if we
    # skipped test entirely (bot-driven redeploy).
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - run: npm ci

      - name: Build site
        run: npm run build

      # SPA fallback: GitHub Pages serves 404.html for unknown paths, which
      # lets the client-side router handle deep links like /events.
      - name: Copy index.html to 404.html for SPA routing
        run: cp .dist/index.html .dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .dist

  deploy:
    needs: build
    # Bot-driven redeploys skip the `test` job, which causes GitHub to mark
    # this job as skipped by default even though `build` succeeded. Force it.
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
