name: Update attendance

on:
  repository_dispatch:
    types: [update-attendance]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply edit to data/attendance.json
        env:
          EVENT_ID: ${{ github.event.client_payload.event_id }}
          NAME:     ${{ github.event.client_payload.name }}
          ACTION:   ${{ github.event.client_payload.action }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          event_id = os.environ['EVENT_ID']
          name     = os.environ['NAME']
          action   = os.environ['ACTION']
          if not event_id: raise SystemExit('client_payload.event_id is required')
          if not name:     raise SystemExit('client_payload.name is required')
          if action not in ('add', 'remove'):
              raise SystemExit(f'invalid action: {action!r}')

          path = pathlib.Path('data/attendance.json')
          data = json.loads(path.read_text())
          attendees = data.get(event_id, [])

          if action == 'add' and name not in attendees:
              attendees.append(name)
          elif action == 'remove' and name in attendees:
              attendees.remove(name)

          data[event_id] = attendees
          path.write_text(json.dumps(data, indent=2, sort_keys=True) + '\n')
          PY

      - name: Commit
        run: |
          git config user.name  "jxnfilmclub-bot"
          git config user.email "bot@jxnfilm.club"
          if git diff --quiet; then
            echo "No changes"
          else
            git add data/attendance.json
            git commit -m "chore: update event attendance"
            git push
          fi
