name: Update member

on:
  repository_dispatch:
    types: [update-member]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply edit to data/members.json
        env:
          ID:      ${{ github.event.client_payload.id }}
          UPDATES: ${{ toJSON(github.event.client_payload.updates) }}
        run: |
          python3 - <<'PY'
          import json, os, pathlib
          # Worker is the source of truth for authorization; this workflow just
          # applies an allow-listed set of fields to the matching member row.
          ALLOWED = {'name', 'pronouns', 'handle'}

          id_ = os.environ['ID']
          if not id_:
              raise SystemExit('client_payload.id is required')
          updates = json.loads(os.environ['UPDATES'])

          path = pathlib.Path('data/members.json')
          members = json.loads(path.read_text())

          for m in members:
              if m.get('id') == id_:
                  for k, v in updates.items():
                      if k not in ALLOWED:
                          continue
                      # Explicit null → remove the field from the public row.
                      # Absent keys are left alone by virtue of not being in `updates`.
                      if v is None:
                          m.pop(k, None)
                      else:
                          m[k] = v
                  break
          else:
              raise SystemExit(f'member not found: {id_}')

          path.write_text(json.dumps(members, indent=2) + '\n')
          PY

      - name: Commit
        run: |
          git config user.name  "jxnfilmclub-bot"
          git config user.email "bot@jxnfilm.club"
          if git diff --quiet; then
            echo "No changes"
          else
            git add data/members.json
            git commit -m "chore: update member entry"
            git push
          fi
