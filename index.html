<!doctype dhtml>

<script>
  import { state } from 'state'

  state.setup({
    route: '/:type',
    query: ['query', 'sort'],
    autolink: true,
  })

  function isSignedIn() {
    try {
      const raw = localStorage.jxnfc_session
      if (!raw) return false
      const s = JSON.parse(raw)
      return !!(s?.token && s.exp > Date.now())
    } catch { return false }
  }

  // Accept a session handed off from join.jxnfilm.club after signup/verify:
  //   https://jxnfilm.club/edit#token=<payload>.<sig>
  // Store it locally, then strip the fragment so it doesn't leak into
  // subsequent navigations or referrer headers.
  function consumeSessionHash() {
    const m = location.hash.match(/(?:^#|&)token=([^&]+)/)
    if (!m) return
    try {
      const token = decodeURIComponent(m[1])
      const claims = JSON.parse(atob(token.split('.')[0].replace(/-/g, '+').replace(/_/g, '/')))
      localStorage.jxnfc_session = JSON.stringify({
        token, email: claims.email, id: claims.id, exp: claims.exp,
      })
    } catch { /* ignore malformed hash */ }
    history.replaceState({}, '', location.pathname + location.search)
  }
</script>

<body>

  <header>
    <nav class="mastnav wrap">
      <a href="/" class="logo"><img src="/img/nue.svg" alt=""> Jackson Film Club</a>
      <a href="/">Members</a>
      <a href="/events">Events</a>
      <a :if="!signedIn" href="https://join.jxnfilm.club/" :onclick="goJoin" class="auth-link">Join</a>
      <a :if="!signedIn" href="/signin">Log in</a>
      <a :if="signedIn" href="/edit">Edit account</a>
    </nav>
  </header>

  <main class="wrap">
    <article/>
  </main>

  <script>
    state.on('type', ({ type }) => {
      this.update({ signedIn: isSignedIn() })
      const view =
        type === 'events' ? 'events-view' :
        type === 'signin' ? 'sign-in-view' :
        type === 'edit'   ? 'edit-view' :
                            'members-view'
      this.mount(view, 'article')
    })

    mounted() {
      consumeSessionHash()
      this.update({ signedIn: isSignedIn() })
      state.init()
    }

    goJoin(e) {
      e.preventDefault()
      window.location.href = 'https://join.jxnfilm.club/'
    }
  </script>

</body>
