<!doctype dhtml>

<script>
  import { state } from 'state'

  state.setup({
    route: '/:type',
    query: ['query', 'sort'],
    autolink: true,
  })
</script>

<body>

  <header>
    <nav class="mastnav wrap">
      <a href="/" class="logo"><img src="/img/nue.svg" alt=""> Jackson Film Club</a>
      <a href="/">Members</a>
      <a href="/events">Events</a>
      <a href="https://join.jxnfilm.club/" class="auth-link">Join</a>
      <a href="/signin">Edit my entry</a>
    </nav>
  </header>

  <main class="wrap">
    <article/>
  </main>

  <script>
    state.on('type', ({ type }) => {
      const view =
        type === 'events' ? 'events-view' :
        type === 'signin' ? 'sign-in-view' :
        type === 'edit'   ? 'edit-view' :
                            'members-view'
      this.mount(view, 'article')
    })

    mounted() {
      state.init()
    }
  </script>

</body>
