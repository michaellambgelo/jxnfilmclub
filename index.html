<!doctype dhtml>

<script>
  import { state } from 'state'

  state.setup({
    route: '/:type',
    query: ['query', 'sort', 'email'],
    autolink: true,
  })

  function isSignedIn() {
    try {
      const raw = localStorage.jxnfc_session
      if (!raw) return false
      const s = JSON.parse(raw)
      return !!(s?.token && s.exp > Date.now())
    } catch { return false }
  }

  // Work around Nue's autolink intercepting every anchor click. Autolink's
  // listener runs on the bubble phase at document level; a capture-phase
  // stopImmediatePropagation before it fires lets the browser handle
  // cross-origin and target="_blank" anchors natively.
  document.addEventListener('click', (e) => {
    const a = e.target?.closest?.('a[href]')
    if (!a) return
    const url = new URL(a.href, location.href)
    const external = url.origin !== location.origin
    if (external || a.target === '_blank') {
      e.stopImmediatePropagation()
    }
  }, true)
</script>

<body>

  <header>
    <nav class="mastnav wrap">
      <a href="/" class="logo"><img src="/img/nue.svg" alt=""> Jackson Film Club</a>
      <a href="/">Members</a>
      <a href="/events">Events</a>
      <a :if="!signedIn" href="https://join.jxnfilm.club/" class="auth-link">Join</a>
      <a :if="!signedIn" href="/signin">Log in</a>
      <a :if="signedIn" href="/edit">Edit account</a>
    </nav>
  </header>

  <main class="wrap">
    <article/>
  </main>

  <script>
    state.on('type', ({ type }) => {
      this.update({ signedIn: isSignedIn() })
      const view =
        type === 'events' ? 'events-view' :
        type === 'signin' ? 'sign-in-view' :
        type === 'verify' ? 'verify-view' :
        type === 'edit'   ? 'edit-view' :
                            'members-view'
      this.mount(view, 'article')
    })

    mounted() {
      this.update({ signedIn: isSignedIn() })
      state.init()
    }
  </script>

</body>
