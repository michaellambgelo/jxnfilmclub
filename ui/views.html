
<!doctype dhtml lib>

<script>
  import { state } from 'state'
  import { getMembers, getEvents } from 'app'
</script>


<!-- Members list -->
<article :is="members-view">
  <h1>Members</h1>

  <header>
    <input type="search" name="query" placeholder="Search members"
      value="{ state.query || '' }"
      :oninput="state.query = $event.target.value">

    <label>
      <b>Sort by:</b>
      <select :onchange="state.sort = $event.target.value">
        <option value="joined" :selected="(state.sort || 'joined') === 'joined'">Join date</option>
        <option value="name" :selected="state.sort === 'name'">Name</option>
        <option value="handle" :selected="state.sort === 'handle'">Letterboxd handle</option>
      </select>
    </label>
  </header>

  <table>
    <thead>
      <tr>
        <th colspan="2">{ total || 0 } members</th>
        <th>Letterboxd</th>
        <th>Joined</th>
      </tr>
    </thead>
    <tr :each="el in items" key="{ el.id || el.handle }">
      <td><avatar :name="el.name"/></td>
      <td><h3>{ el.name }</h3></td>
      <td>
        <a :if="el.handle" href="https://letterboxd.com/{ el.handle }/" target="_blank" rel="noopener">@{ el.handle }</a>
      </td>
      <td><timeago :ts="el.joined"/></td>
    </tr>
  </table>

  <script>
    state.on('query sort', () => this.reload())

    async reload() {
      const { items, total } = await getMembers({
        search: state.query,
        sort: state.sort,
      })
      this.update({ items, total })
    }

    async mounted() {
      await this.reload()
    }
  </script>
</article>


<!-- Events list -->
<article :is="events-view">
  <h1>Events</h1>

  <header>
    <input type="search" name="query" placeholder="Search events"
      value="{ state.query || '' }"
      :oninput="state.query = $event.target.value">

    <label>
      <b>Sort by:</b>
      <select :onchange="state.sort = $event.target.value">
        <option value="date" :selected="(state.sort || 'date') === 'date'">Date</option>
        <option value="title" :selected="state.sort === 'title'">Title</option>
        <option value="film" :selected="state.sort === 'film'">Film</option>
      </select>
    </label>
  </header>

  <table>
    <thead>
      <tr>
        <th colspan="2">{ total || 0 } events</th>
        <th>Film</th>
        <th>Venue</th>
        <th>Date</th>
        <th>Attendance</th>
      </tr>
    </thead>
    <tr :each="el in items" key="{ el.id }">
      <td>
        <img :if="el.poster" :src="el.poster" class="event-poster" alt="">
      </td>
      <td>
        <h3>{ el.title }</h3>
      </td>
      <td>
        <a :if="el.letterboxd_uri" href="{ el.letterboxd_uri }" target="_blank" rel="noopener">{ el.film }</a>
        <span :if="!el.letterboxd_uri">{ el.film }</span>
      </td>
      <td>{ el.venue }</td>
      <td>{ formatDate(el.date) }</td>
      <td class="attendance-cell">
        <div class="attendance-count">{ attendeesFor(el.id).length } attended</div>
        <div :if="attendeesFor(el.id).length" class="attendance-list">
          <a :each="h in attendeesFor(el.id)" key="{ h }"
            href="https://letterboxd.com/{ h }/" target="_blank" rel="noopener">@{ h }</a>
        </div>
        <button :if="canToggle(el.id)" type="button" class="attend-btn"
          :disabled="busyId === el.id"
          :onclick="toggleAttend(el.id)">
          { attended(el.id) ? 'Remove me' : 'I was there' }
        </button>
      </td>
    </tr>
  </table>

  <script>
    const WORKER_ORIGIN = globalThis.JXNFC_WORKER_ORIGIN || 'https://join.jxnfilm.club'

    function getSession() {
      try {
        const raw = localStorage.jxnfc_session
        const s = raw ? JSON.parse(raw) : null
        return s?.token && s.exp > Date.now() ? s : null
      } catch { return null }
    }

    state.on('query sort', () => this.reload())

    async reload() {
      const [{ items, total }, attendance] = await Promise.all([
        getEvents({ search: state.query, sort: state.sort }),
        fetch('./data/attendance.json').then(r => r.ok ? r.json() : {}).catch(() => ({})),
      ])
      this.update({ items, total, attendance })
    }

    async mounted() {
      this.update({ session: getSession(), busyId: null, attendance: {} })
      await this.reload()
    }

    formatDate(ts) {
      if (!ts) return ''
      return new Date(ts).toLocaleDateString('en-US', {
        year: 'numeric', month: 'short', day: 'numeric',
      })
    }

    attendeesFor(id) {
      return (this.attendance && this.attendance[id]) || []
    }

    canToggle(id) {
      return !!(this.session && this.session.handle)
    }

    attended(id) {
      return this.session?.handle && this.attendeesFor(id).includes(this.session.handle)
    }

    async toggleAttend(id) {
      if (!this.session?.handle) return
      const method = this.attended(id) ? 'DELETE' : 'POST'
      this.update({ busyId: id })
      try {
        const res = await fetch(`${WORKER_ORIGIN}/events/${encodeURIComponent(id)}/attend`, {
          method,
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${this.session.token}`,
          },
        })
        const data = await res.json().catch(() => ({}))
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`)
        const attendance = { ...this.attendance, [id]: data.attendees || [] }
        this.update({ attendance, busyId: null })
      } catch (err) {
        console.error('attendance toggle failed:', err)
        this.update({ busyId: null })
      }
    }
  </script>
</article>
