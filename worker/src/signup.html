<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join · Jackson Film Club</title>
  <style>
    body { max-width: 32rem; margin: 3rem auto; padding: 0 1.25rem; font: 16px/1.5 system-ui, sans-serif; color: #222; }
    .topnav { margin-bottom: 1.25rem; font-size: 0.9rem; }
    .topnav a { color: #0a58ca; text-decoration: none; }
    .topnav a:hover { text-decoration: underline; }
    h1 { margin-bottom: 0.25rem; }
    p.lede { color: #666; margin-top: 0; }
    form { display: grid; gap: 1rem; margin-top: 2rem; }
    label { display: grid; gap: 0.35rem; font-size: 0.9rem; color: #555; }
    input[type="text"], input[type="email"] {
      padding: 0.6rem 0.75rem; font: inherit; border: 1px solid #ccc; border-radius: 4px;
    }
    button {
      padding: 0.7rem; font: inherit; font-weight: 600;
      background: #111; color: white; border: 0; border-radius: 4px; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .hint { color: #888; font-size: 0.85rem; }
    .hint a { color: #0a58ca; }
    .err { background: #fdecec; color: #8a1f1f; padding: 0.75rem; border-radius: 4px; }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="%SITE_ORIGIN%/">← Back to Jackson Film Club</a>
  </nav>

  <h1>Join Jackson Film Club</h1>
  <p class="lede">Confirm your email to become a member. Letterboxd
    verification is optional and can be done any time after you sign up.</p>

  <form id="signup-form">
    <label>Display name
      <input type="text" name="name" required autocomplete="name">
    </label>
    <label>Email
      <input type="email" name="email" required autocomplete="email">
    </label>
    <label>Letterboxd username <span class="hint">— optional</span>
      <input type="text" name="handle" pattern="[a-zA-Z0-9_-]+"
             placeholder="e.g. davidehrlich" autocomplete="off">
    </label>
    <button type="submit">Email me a code</button>
    <p class="hint">Your email is used only for login codes and is never
      shown publicly. <a href="/privacy">Privacy policy</a>.</p>
  </form>

  <div id="status"></div>

  <script>
    const form = document.getElementById('signup-form')
    const status = document.getElementById('status')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      const btn = form.querySelector('button[type="submit"]')
      btn.disabled = true
      status.className = ''
      status.textContent = ''

      const data = Object.fromEntries(new FormData(form))
      if (!data.handle) delete data.handle

      try {
        const res = await fetch('/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
        })
        const body = await res.json().catch(() => ({}))
        if (!res.ok) throw new Error(body.error || 'Signup failed')

        // Worker is API-only. Code entry happens on the main site so the
        // session we create lives in the right origin's localStorage.
        location.href = '%SITE_ORIGIN%/verify?email=' + encodeURIComponent(data.email)
      } catch (err) {
        status.className = 'err'
        status.textContent = err.message
        btn.disabled = false
      }
    })
  </script>
</body>
</html>
